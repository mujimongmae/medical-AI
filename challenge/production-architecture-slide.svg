<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" width="1280" height="760" font-family="'Apple SD Gothic Neo','Malgun Gothic','Pretendard',system-ui,-apple-system,sans-serif">
  <defs>
    <marker id="mGray" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 Z" fill="#64748b"/></marker>
    <marker id="mBlue" markerWidth="11" markerHeight="11" refX="7" refY="4" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 Z" fill="#3b82f6"/></marker>
    <marker id="mRed" markerWidth="12" markerHeight="12" refX="7" refY="4" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 Z" fill="#4f46e5"/></marker>
    <marker id="mIndigo" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 Z" fill="#6366f1"/></marker>
    <marker id="mPurple" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 Z" fill="#a855f7"/></marker>
    <marker id="mCyan" markerWidth="11" markerHeight="11" refX="7" refY="4" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 Z" fill="#0891b2"/></marker>
    <style>
      .title{font-size:27px;font-weight:800;fill:#0f172a}
      .sub{font-size:15px;fill:#475569}
      .sec{font-size:18px;font-weight:800;fill:#334155}
      .bt{font-size:20px;font-weight:800;fill:#0f172a}
      .kw{font-size:14px;fill:#64748b}
      .lbl{font-size:12px;font-weight:800;fill:#334155}
      .foot{font-size:12.5px;fill:#64748b}
      .cloud{font-size:12.5px;font-weight:800;fill:#6b7280}
      .pill{font-size:10px;font-weight:800}
      .note{font-size:11.5px;fill:#94a3b8}
    </style>
  </defs>

  <rect x="0" y="0" width="1280" height="760" fill="#ffffff"/>

  <!-- ===================== TITLE ===================== -->
  <text x="40" y="46" class="title">지역사회 응급대응 AI · 한눈에 보는 아키텍처</text>
  <text x="40" y="70" class="sub">홈캠 감지  →  응급대응 백엔드  →  환자 · 이웃 앱  +  119 자동신고</text>

  <!-- ===================== CLOUD BAND ===================== -->
  <rect x="30" y="80" width="790" height="76" rx="14" fill="#fbfcff" stroke="#cbd5e1" stroke-width="1.4" stroke-dasharray="6 5"/>
  <text x="44" y="99" class="cloud">🖥 온프레미스 AI · 메시징</text>
  <rect x="44" y="105" width="440" height="44" rx="11" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.6"/>
  <text x="264" y="133" text-anchor="middle" class="bt" fill="#0f172a">on-premise LLM · 보조·요약</text>
  <rect x="500" y="105" width="306" height="44" rx="11" fill="#eef2ff" stroke="#6366f1" stroke-width="1.6"/>
  <text x="653" y="133" text-anchor="middle" class="bt" fill="#0f172a">FCM 푸시</text>

  <!-- ===================== HIRA (external data source) ===================== -->
  <rect x="846" y="80" width="410" height="76" rx="14" fill="#ecfeff" stroke="#0891b2" stroke-width="1.4" stroke-dasharray="6 5"/>
  <text x="860" y="99" class="cloud" fill="#0e7490">🏥 외부 데이터 · 심평원</text>
  <rect x="860" y="105" width="382" height="44" rx="11" fill="#ffffff" stroke="#06b6d4" stroke-width="1.6"/>
  <text x="1051" y="133" text-anchor="middle" class="bt" fill="#0e7490">과거력 자동 조회</text>
  <line x1="1051" y1="156" x2="1051" y2="170" stroke="#0891b2" stroke-width="2.8" marker-end="url(#mCyan)"/>

  <!-- ===================== EDGE PANEL ===================== -->
  <rect x="24" y="170" width="300" height="420" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="40" y="200" class="sec">① 홈캠 · 엣지</text>
  <rect x="206" y="186" width="102" height="18" rx="9" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="257" y="198.5" text-anchor="middle" class="pill" fill="#15803d">온디바이스 AI</text>

  <rect x="42" y="240" width="252" height="120" rx="12" fill="#ecfeff" stroke="#06b6d4" stroke-width="1.8"/>
  <text x="168" y="294" text-anchor="middle" class="bt">포즈 추정</text>
  <text x="168" y="322" text-anchor="middle" class="kw">카메라 · MediaPipe (온디바이스)</text>

  <rect x="42" y="410" width="252" height="120" rx="12" fill="#faf5ff" stroke="#a855f7" stroke-width="2"/>
  <text x="168" y="464" text-anchor="middle" class="bt" fill="#4338ca">낙상 확정</text>
  <text x="168" y="492" text-anchor="middle" class="kw">ST-GCN 판정 (로컬)</text>

  <text x="40" y="560" class="note">온디바이스 추론 · 원본 영상 미전송 (프라이버시)</text>

  <line x1="168" y1="360" x2="168" y2="410" stroke="#a855f7" stroke-width="2.4" marker-end="url(#mPurple)"/>

  <!-- ===================== BACKEND PANEL ===================== -->
  <rect x="440" y="170" width="340" height="420" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="456" y="200" class="sec">② 응급대응 백엔드</text>

  <rect x="456" y="240" width="308" height="120" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.8"/>
  <text x="610" y="294" text-anchor="middle" class="bt">실시간 이벤트 허브</text>
  <text x="610" y="322" text-anchor="middle" class="kw">라우팅 · WebSocket · 병력 DB</text>

  <rect x="456" y="410" width="308" height="120" rx="12" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.8"/>
  <text x="610" y="464" text-anchor="middle" class="bt">119 · 이웃 호출</text>
  <text x="610" y="492" text-anchor="middle" class="kw">15초 에스컬레이션 · LLM 요약</text>

  <line x1="610" y1="360" x2="610" y2="410" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#mGray)"/>

  <!-- ===================== PHONE PANEL ===================== -->
  <rect x="900" y="170" width="356" height="420" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="916" y="200" class="sec">③ 주민 앱 · 폰</text>

  <!-- patient app -->
  <rect x="912" y="240" width="332" height="150" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="1.8"/>
  <text x="1078" y="300" text-anchor="middle" class="bt" fill="#4338ca">환자 앱</text>
  <text x="1078" y="332" text-anchor="middle" class="kw">전체화면 경보 · 사이렌</text>
  <text x="1078" y="356" text-anchor="middle" class="kw">15초 내 자가취소</text>

  <!-- neighbor app -->
  <rect x="912" y="410" width="332" height="150" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.8"/>
  <text x="1078" y="470" text-anchor="middle" class="bt" fill="#15803d">이웃 앱</text>
  <text x="1078" y="502" text-anchor="middle" class="kw">가까운 이웃 전원 호출</text>
  <text x="1078" y="526" text-anchor="middle" class="kw">현장 STT · CPR 가이드</text>

  <!-- ===================== EMS ===================== -->
  <rect x="940" y="612" width="316" height="56" rx="12" fill="#eef2ff" stroke="#2563eb" stroke-width="2"/>
  <text x="1098" y="646" text-anchor="middle" class="bt" fill="#1d4ed8">119 · 구급대</text>

  <!-- ===================== INTER-SYSTEM ARROWS ===================== -->
  <!-- edge -> backend -->
  <path d="M294,470 L368,470 L368,300 L440,300" fill="none" stroke="#4f46e5" stroke-width="2.8" marker-end="url(#mRed)"/>
  <text x="366" y="392" transform="rotate(90 366 392)" text-anchor="middle" class="lbl" fill="#4338ca">낙상 이벤트</text>

  <!-- backend -> patient -->
  <line x1="780" y1="300" x2="910" y2="300" stroke="#3b82f6" stroke-width="2.6" marker-end="url(#mBlue)"/>
  <text x="845" y="292" text-anchor="middle" class="lbl" fill="#1d4ed8">ALERT_SELF</text>

  <!-- backend -> neighbor -->
  <line x1="780" y1="470" x2="910" y2="470" stroke="#3b82f6" stroke-width="2.6" marker-end="url(#mBlue)"/>
  <text x="845" y="462" text-anchor="middle" class="lbl" fill="#1d4ed8">NEIGHBOR_ALERT</text>
  <!-- neighbor -> backend : voice STT -->
  <line x1="910" y1="506" x2="780" y2="506" stroke="#4f46e5" stroke-width="2.4" marker-end="url(#mRed)"/>
  <text x="845" y="498" text-anchor="middle" class="lbl" fill="#4338ca">현장 STT</text>

  <!-- backend -> EMS -->
  <path d="M610,590 L610,639 L940,639" fill="none" stroke="#4f46e5" stroke-width="2.6" marker-end="url(#mRed)"/>
  <text x="775" y="632" text-anchor="middle" class="lbl" fill="#4338ca">119 자동신고</text>

  <!-- ===================== LEGEND ===================== -->
  <line x1="30" y1="690" x2="1250" y2="690" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="40" y1="708" x2="70" y2="708" stroke="#4f46e5" stroke-width="2.8" marker-end="url(#mRed)"/>
  <text x="78" y="712" class="foot">HTTPS (이벤트 · 음성)</text>
  <line x1="290" y1="708" x2="320" y2="708" stroke="#3b82f6" stroke-width="2.8" marker-end="url(#mBlue)"/>
  <text x="328" y="712" class="foot">WebSocket (실시간 알림)</text>
  <line x1="560" y1="708" x2="590" y2="708" stroke="#0891b2" stroke-width="2.8" marker-end="url(#mCyan)"/>
  <text x="598" y="712" class="foot">심평원 과거력 조회</text>
  <line x1="820" y1="708" x2="850" y2="708" stroke="#a855f7" stroke-width="2.8" marker-end="url(#mPurple)"/>
  <text x="858" y="712" class="foot">온디바이스 판정</text>

  <!-- ===================== FOOTER ===================== -->
  <text x="40" y="740" class="note">온디바이스 감지(MediaPipe + 로컬 ST-GCN) · 현장 STT는 이웃 폰 · on-premise LLM이 요약·보조 · 데이터 전부 합성(PHI 없음) · 본 정보는 참고용이며 의학적 진단이 아닙니다</text>
</svg>
